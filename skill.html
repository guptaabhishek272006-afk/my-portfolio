<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Skills</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#9a1414;
}

#skills{
    width:80%;
    margin:50px auto;
}

h2{
    text-align:center;
    font-size:40px;
}

.skill{
    margin:20px 0;
}

.skill-name{
    font-size:18px;
    font-weight:bold;
    margin-bottom:5px;
}

.skill-bar{
    width:100%;
    height:25px;
    background:#0c2d52;
    border-radius:20px;
    overflow:hidden;
}

.skill-per{
    height:100%;
    background:linear-gradient(90deg,#007bff,#00d4ff);
    border-radius:20px;
    color:white;
    text-align:right;
    padding-right:10px;
    line-height:25px;
    animation: fillBars 3s ease-in-out forwards;
}

.html{width:90%;}
.css{width:85%;}
.js{width:75%;}
.python{width:70%;}
.c{width:80%;}

@keyframes fillBars{
    from{
        width:0;
    }
}
</style>
</head>
<body>

<section id="skills">
    <h2>My Skills</h2>

    <div class="skill">
        <div class="skill-name">HTML</div>
        <div class="skill-bar">
            <div class="skill-per html">90%</div>
        </div>
    </div>

    <div class="skill">
        <div class="skill-name">CSS</div>
        <div class="skill-bar">
            <div class="skill-per css">85%</div>
        </div>
    </div>

    <div class="skill">
        <div class="skill-name">JavaScript</div>
        <div class="skill-bar">
            <div class="skill-per js">75%</div>
        </div>
    </div>

    <div class="skill">
        <div class="skill-name">Python</div>
        <div class="skill-bar">
            <div class="skill-per python">70%</div>
        </div>
    </div>

    <div class="skill">
        <div class="skill-name">C Programming</div>
        <div class="skill-bar">
            <div class="skill-per c">80%</div>
        </div>
    </div>

</section>

</body>
</html>
